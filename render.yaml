services:
  - type: web
    name: icrik-final-strapi
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /_health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 1337
      # Veritabani — Render PostgreSQL'den otomatik alinir
      - key: DATABASE_CLIENT
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: icrik-final-db
          property: connectionString
      - key: DATABASE_SSL
        value: true
      # Strapi secrets — once deploy edin, sonra girin
      - key: APP_KEYS
        sync: false
      - key: API_TOKEN_SALT
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
      - key: TRANSFER_TOKEN_SALT
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      # i18n
      - key: STRAPI_PLUGIN_I18N_INIT_LOCALE_CODE
        value: tr

databases:
  - name: icrik-final-db
    databaseName: strapi_icrik
    user: strapi_user
    plan: free
    region: frankfurt
